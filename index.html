.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--purp2);box-shadow:0 0 0 3px rgba(107,53,176,.1)}
.fg textarea{resize:vertical;min-height:105px}
.fsub{width:100%;padding:15px;background:linear-gradient(135deg,var(--mag),var(--purp2));color:#fff;border:none;border-radius:50px;font-family:'Inter',sans-serif;font-size:.9rem;font-weight:700;letter-spacing:.06em;cursor:pointer;transition:.25s;margin-top:4px}
.fsub:hover{transform:translateY(-2px);box-shadow:0 8px 26px rgba(196,0,106,.42)}
.fnote{font-size:.72rem;color:var(--sub);text-align:center;margin-top:12px}

/* ===== FOOTER ===== */
footer{background:#06000f;padding:60px 28px 26px}
.foot-inner{max-width:1160px;margin:0 auto}
.foot-top{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:48px;padding-bottom:44px;border-bottom:1px solid rgba(255,255,255,.07)}
.foot-brand strong{font-family:'Playfair Display',serif;font-size:1.1rem;color:#fff}
.foot-brand strong span{color:var(--mag2)}
.foot-brand em{display:block;font-family:'Dancing Script',cursive;font-size:.95rem;color:var(--goldf);font-style:normal;margin:4px 0 12px}
.foot-brand p{font-size:.78rem;color:rgba(255,255,255,.38);line-height:1.75}
.foot-col h4{font-size:.72rem;font-weight:700;color:#fff;letter-spacing:.14em;text-transform:uppercase;margin-bottom:16px}
.foot-col ul{list-style:none;display:flex;flex-direction:column;gap:9px}
.foot-col ul a{font-size:.8rem;color:rgba(255,255,255,.45);text-decoration:none;transition:.18s}
.foot-col ul a:hover{color:var(--mag2)}
.foot-bot{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;padding-top:22px}
.foot-bot p{font-size:.73rem;color:rgba(255,255,255,.25)}

/* WA */
.wa{position:fixed;bottom:26px;right:26px;z-index:999;width:58px;height:58px;border-radius:50%;background:#25d366;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 22px rgba(37,211,102,.5);text-decoration:none;font-size:1.55rem;transition:.28s}
.wa:hover{transform:scale(1.12);box-shadow:0 6px 30px rgba(37,211,102,.65)}

/* fade */
.fi{opacity:0;transform:translateY(26px);transition:opacity .65s ease,transform .65s ease}
.fi.vis{opacity:1;transform:translateY(0)}

/* ===== RESPONSIVE ===== */
@media(max-width:960px){
  .nav-links{display:none}
  .burger{display:flex}
  .about-grid,.contact-grid{grid-template-columns:1fr}
  .about-img-side{order:-1}
  .proc-grid{grid-template-columns:1fr 1fr;gap:28px}
  .proc-grid::before{display:none}
  .foot-top{grid-template-columns:1fr 1fr}
  .frow{grid-template-columns:1fr}
}
@media(max-width:580px){
  .sec{padding:64px 18px}
  .hero-h1{font-size:2rem}
  .hstat{min-width:90px;padding:16px 10px}
  .foot-top{grid-template-columns:1fr}
}
</style>
</head>

        <h2 class="sh">Muhammad — The Consultant Authors <em>Trust to Deliver Results</em></h2>

<script>
// Nav toggle
function toggleNav(){
  const ul=document.getElementById('navLinks');
  const open=ul.style.display==='flex';
  ul.style.cssText=open?'':'display:flex;flex-direction:column;position:absolute;top:70px;left:0;right:0;background:rgba(15,6,40,.97);padding:18px 28px;gap:4px;border-bottom:1px solid rgba(255,255,255,.08)';
}
document.querySelectorAll('#navLinks a').forEach(a=>a.addEventListener('click',()=>{
  const ul=document.getElementById('navLinks');
  if(window.innerWidth<960)ul.style.display='none';
}));

// FAQ
function faq(btn){
  const a=btn.nextElementSibling;
  const isOpen=a.classList.contains('open');
  document.querySelectorAll('.faq-a.open').forEach(el=>el.classList.remove('open'));
  document.querySelectorAll('.faq-q.open').forEach(el=>el.classList.remove('open'));
  if(!isOpen){a.classList.add('open');btn.classList.add('open')}
}

// Scroll fade
const io=new IntersectionObserver(entries=>{
  entries.forEach((e,i)=>{
    if(e.isIntersecting){
      setTimeout(()=>e.target.classList.add('vis'),i*70);
      io.unobserve(e.target);
    }
  });
},{threshold:.1});
document.querySelectorAll('.fi').forEach(el=>io.observe(el));

// Form submit
async function handleForm(e){
  e.preventDefault();
  const btn=document.getElementById('submitBtn');
  const msg=document.getElementById('formMsg');
  btn.textContent='Sending...';
  btn.disabled=true;
  try{
    const res=await fetch(e.target.action,{
      method:'POST',
      body:new FormData(e.target),
      headers:{Accept:'application/json'}
    });
    if(res.ok){
      btn.textContent='✓ Message Sent!';
      btn.style.background='#25d366';
      msg.textContent='Thank you! I will respond within 24 hours.';
      msg.style.color='#2a8a4a';
      e.target.reset();
    } else {
      throw new Error();
    }
  } catch{
    btn.textContent='Send Message →';
    btn.disabled=false;
    msg.textContent='Something went wrong. Please email me directly.';
    msg.style.color='red';
  }
}
</script>
